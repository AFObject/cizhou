<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>实词数据检查器</title>
<style>
  :root {
    --bg: #fafaf7;
    --fg: #1a1a2e;
    --muted: #6b6b7b;
    --line: #e6e3d8;
    --accent: #c14545;
    --warn: #e6a23c;
    --ok: #67c23a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    font-family: -apple-system, "PingFang SC", "Source Han Serif SC", "Noto Serif CJK SC", serif;
    color: var(--fg); background: var(--bg);
  }
  header {
    padding: 12px 20px; border-bottom: 1px solid var(--line);
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
  }
  header h1 { font-size: 18px; margin: 0; }
  header .stat { color: var(--muted); font-size: 13px; }
  header label { font-size: 13px; }
  main {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100% - 56px);
  }
  aside {
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 8px 0;
  }
  aside .item {
    padding: 6px 14px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 14px;
  }
  aside .item:hover { background: #f0ede2; }
  aside .item.active { background: #ece7d5; }
  aside .item .id { color: var(--muted); font-size: 12px; }
  aside .item .flag { font-size: 11px; }
  .flag.warn { color: var(--warn); }
  .flag.err  { color: var(--accent); }
  section.detail {
    overflow-y: auto; padding: 24px 36px;
  }
  .word-title {
    font-size: 32px; margin-bottom: 4px;
  }
  .word-meta {
    color: var(--muted); font-size: 13px; margin-bottom: 20px;
  }
  .sub-title {
    margin-top: 28px; margin-bottom: 8px;
    font-size: 20px; border-left: 4px solid var(--accent);
    padding-left: 10px;
  }
  .sense {
    padding: 12px 14px; margin: 10px 0;
    border: 1px solid var(--line); border-radius: 8px;
    background: #fff;
  }
  .sense.suspect { border-color: var(--warn); background: #fffbef; }
  .sense.note { border-color: var(--accent); background: #fff3f3; }
  .sense .label { font-weight: bold; margin-right: 8px; color: var(--accent); }
  .sense .meaning { font-size: 16px; }
  .sense .example {
    margin-top: 6px; color: #333; font-size: 15px;
    font-family: "Source Han Serif SC", "Noto Serif CJK SC", serif;
  }
  .sense .source { margin-top: 4px; color: var(--muted); font-size: 13px; }
  .sense .phrases { margin-top: 4px; }
  .sense .phrases .tag {
    display: inline-block; padding: 1px 8px; margin-right: 4px;
    background: #efe6cf; border-radius: 4px; font-size: 12px;
  }
  .sense .warning {
    margin-top: 6px; color: var(--warn); font-size: 12px;
  }
  .filterbar {
    margin-bottom: 8px; padding: 0 14px;
  }
  .filterbar input {
    width: 100%; padding: 6px 10px;
    border: 1px solid var(--line); border-radius: 6px;
  }
  .empty { color: var(--muted); padding: 60px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>实词数据检查器</h1>
  <input type="file" id="file" accept=".json" />
  <span class="stat" id="stat"></span>
  <label><input type="checkbox" id="onlySuspect"/> 仅显示可疑</label>
</header>
<main>
  <aside>
    <div class="filterbar">
      <input id="search" placeholder="搜索字 / 编号..." />
    </div>
    <div id="list"></div>
  </aside>
  <section class="detail" id="detail">
    <div class="empty">请先加载 JSON 文件</div>
  </section>
</main>

<script>
let DATA = null;

const $ = (s) => document.querySelector(s);

document.getElementById('file').addEventListener('change', async (e) => {
  const f = e.target.files[0];
  if (!f) return;
  const text = await f.text();
  try {
    DATA = JSON.parse(text);
    render();
  } catch (err) {
    alert('JSON 解析失败: ' + err.message);
  }
});

document.getElementById('search').addEventListener('input', renderList);
document.getElementById('onlySuspect').addEventListener('change', renderList);

function collectSenses(entry) {
  const all = entry.senses.map(s => ({s, owner: entry.char}));
  for (const sub of (entry.subEntries || [])) {
    for (const s of sub.senses) all.push({s, owner: sub.char});
  }
  return all;
}

function suspectFlags(s) {
  const flags = [];
  if (s.isNote) flags.push('NOTE');
  if (!s.meaning) flags.push('无释义');
  if (!s.example && (s.phraseKeys || []).length === 0) flags.push('无例句');
  if (s.meaning && s.meaning.length < 2) flags.push('释义过短');
  if (s.example && /[\\\/]{2,}/.test(s.example)) flags.push('含//');
  if (s.example && s.example.length > 80) flags.push('例句过长');
  return flags;
}

function entryIsSuspect(entry) {
  return collectSenses(entry).some(({s}) => suspectFlags(s).length > 0);
}

function render() {
  const total = DATA.words.length;
  let totalSenses = 0, suspects = 0;
  for (const w of DATA.words) {
    const ss = collectSenses(w);
    totalSenses += ss.length;
    suspects += ss.filter(({s}) => suspectFlags(s).length > 0).length;
  }
  $('#stat').textContent = `共 ${total} 词条 / ${totalSenses} 义项 / 可疑 ${suspects}`;
  renderList();
  if (DATA.words.length > 0) renderDetail(DATA.words[0]);
}

function renderList() {
  if (!DATA) return;
  const kw = $('#search').value.trim();
  const onlySus = $('#onlySuspect').checked;
  const list = $('#list');
  list.innerHTML = '';
  for (const w of DATA.words) {
    if (kw) {
      if (!String(w.id).includes(kw) && !w.char.includes(kw)) continue;
    }
    const sus = entryIsSuspect(w);
    if (onlySus && !sus) continue;
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <span><span class="id">${w.id}.</span> ${w.char}</span>
      ${sus ? '<span class="flag warn">⚠</span>' : ''}
    `;
    div.onclick = () => {
      document.querySelectorAll('.item').forEach(x=>x.classList.remove('active'));
      div.classList.add('active');
      renderDetail(w);
    };
    list.appendChild(div);
  }
}

function renderSense(s) {
  const flags = suspectFlags(s);
  const cls = ['sense'];
  if (s.isNote) cls.push('note');
  else if (flags.length) cls.push('suspect');
  return `
    <div class="${cls.join(' ')}">
      <div>
        <span class="label">${s.label || ''}</span>
        <span class="meaning">${escapeHtml(s.meaning || '(无)')}</span>
      </div>
      ${s.example ? `<div class="example">例：${escapeHtml(s.example)}</div>` : ''}
      ${s.source ? `<div class="source">出处：《${escapeHtml(s.source)}》</div>` : ''}
      ${(s.phraseKeys && s.phraseKeys.length) ? `<div class="phrases">${s.phraseKeys.map(p=>`<span class="tag">${escapeHtml(p)}</span>`).join('')}</div>` : ''}
      ${flags.length ? `<div class="warning">⚠ ${flags.join(' / ')} · sid=${s.sid}</div>` : `<div class="warning" style="color:#aaa">sid=${s.sid}</div>`}
    </div>
  `;
}

function renderDetail(w) {
  const detail = $('#detail');
  let html = `
    <div class="word-title">${w.id}. ${escapeHtml(w.char)}</div>
    <div class="word-meta">顶层义项 ${w.senses.length} · 子词条 ${w.subEntries.length}</div>
  `;
  if (w.senses.length) {
    html += w.senses.map(renderSense).join('');
  }
  for (const sub of w.subEntries) {
    html += `<div class="sub-title">（${sub.subId}）${escapeHtml(sub.char)}</div>`;
    html += sub.senses.map(renderSense).join('');
  }
  detail.innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
</script>
</body>
</html>
